<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATS - Procedimentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./css/procedimentos.css">
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle" type="button" onclick="toggleSidebar()" aria-controls="tabs" aria-expanded="true" title="Fechar menu lateral">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>

    <header class="header">
        <div class="header-top">
            <div class="header-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                <div>
                    <h1>SATS - Procedimentos</h1>
                    <span>Sistema de Consulta e Gestão de Riscos Ocupacionais</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-ghost" type="button" onclick="returnToAppSelector()" title="Voltar aos aplicativos">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="4" y="4" width="6" height="6" rx="1"/>
                        <rect x="14" y="4" width="6" height="6" rx="1"/>
                        <rect x="4" y="14" width="6" height="6" rx="1"/>
                        <rect x="14" y="14" width="6" height="6" rx="1"/>
                    </svg>
                    Aplicativos
                </button>
                <button class="btn btn-ghost" id="btnAdmin" onclick="openLogin()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Acesso Admin
                </button>
            </div>
        </div>
        <div class="admin-bar" id="adminBar">
            <span>🔒 Modo Administrador Ativo — Você pode editar as células diretamente</span>
            <div class="admin-actions">
                <button class="btn btn-success btn-sm" onclick="saveChanges()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Salvar (Ctrl+S)
                </button>
                <button class="btn btn-primary btn-sm" onclick="addRiskRecord()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Adicionar registro
                </button>
                <button class="btn btn-primary btn-sm" onclick="exportToCSV()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Exportar CSV
                </button>
                <button class="btn btn-danger btn-sm" onclick="exitAdmin()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Sair
                </button>
            </div>
        </div>
        <nav class="tabs-container">
            <div class="tabs" id="tabs"></div>
        </nav>
    </header>

    <main class="main">
        <section class="filters-panel" aria-label="Filtros da listagem">
            <div class="filters-header">
                <div class="filters-title">Filtros</div>
                <div class="filters-meta">
                    <div class="toolbar-info">
                        Exibindo <strong id="resultCount">0</strong> de <strong id="totalCount">0</strong> registros
                    </div>
                    <div class="view-controls" aria-label="Controles de visualização">
                        <button class="view-btn" id="densityDown" onclick="changeDensity(-1)" title="Reduzir visualização" aria-label="Reduzir visualização">A−</button>
                        <span class="view-label" id="densityLabel">100%</span>
                        <button class="view-btn" id="densityUp" onclick="changeDensity(1)" title="Aumentar visualização" aria-label="Aumentar visualização">A+</button>
                        <span class="view-separator" aria-hidden="true"></span>
                        <button class="view-btn" id="fitColumns" onclick="setColumnView('fit')" title="Ajustar colunas à tela">Ajustar</button>
                        <button class="view-btn" id="wideColumns" onclick="setColumnView('wide')" title="Colunas amplas">Amplo</button>
                        <button class="view-btn" id="resetColumns" onclick="resetColumnWidths()" title="Restaurar larguras">Reset</button>
                    </div>
                </div>
            </div>
            <div class="filters-grid">
                <label class="filter-field" for="riskTypeFilter">
                    <span>Tipo de risco</span>
                    <select id="riskTypeFilter" onchange="handleFilters()"></select>
                </label>
                <label class="filter-field" for="riskNameInput">
                    <span>Nome do risco</span>
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="riskNameInput" placeholder="Buscar pelo nome do risco" oninput="handleFilters()">
                        <button class="clear-search" id="clearRiskName" onclick="clearRiskNameSearch()" title="Limpar busca por nome" aria-label="Limpar busca por nome">×</button>
                    </div>
                </label>
                <label class="filter-field" for="fieldFilter">
                    <span>Campo</span>
                    <select id="fieldFilter" onchange="handleFilters()"></select>
                </label>
                <label class="filter-field" for="searchInput">
                    <span>Busca no conteúdo</span>
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Buscar em todos os campos (Ctrl+F)" oninput="handleSearch()">
                        <button class="clear-search" id="clearSearch" onclick="clearSearch()" title="Limpar busca no conteúdo" aria-label="Limpar busca no conteúdo">×</button>
                    </div>
                </label>
                <button class="btn clear-filters" id="clearFilters" onclick="clearAllFilters()" disabled>Limpar filtros</button>
            </div>
            <div class="risk-legend" id="riskLegend" aria-label="Legenda de cores dos tipos de risco"></div>
        </section>
        <div class="table-wrapper">
            <div class="table-scroll" id="tableContainer"></div>
        </div>
    </main>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>🔐 Acesso Administrativo</h2>
            <p>Digite suas credenciais para acessar o modo de edição.</p>
            <div class="form-group">
                <label for="adminUser">Usuário</label>
                <input type="text" id="adminUser" placeholder="admin" value="admin">
            </div>
            <div class="form-group">
                <label for="adminPass">Senha</label>
                <input type="password" id="adminPass" placeholder="Digite a senha" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <div class="error-msg" id="loginError">Usuário ou senha incorretos.</div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeLogin()" style="color: var(--text-secondary); border-color: var(--border);">Cancelar</button>
                <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

        <script src="./js/procedimentos.js"></script>
</body>
</html>
